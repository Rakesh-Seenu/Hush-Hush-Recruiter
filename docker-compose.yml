# One-command demo stack: API + both frontends, all in demo mode.
#   docker compose up
# API:        http://localhost:8000  (docs at /docs)
# Admin:      http://localhost:5173
# Candidate:  http://localhost:5174

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      AUTH_MODE: demo
      PIPELINE_MODE: demo
      EMAIL_MODE: console
      ADMIN_EMAILS: admin@doodle.com
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      DATABASE_URL: sqlite:////data/hush.db
    volumes:
      - api-data:/data

  admin:
    image: node:20-alpine
    working_dir: /repo
    command: sh -c "npm install && npm run dev:admin -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_AUTH_MODE: demo
    ports:
      - "5173:5173"
    volumes:
      - ./:/repo
      - /repo/node_modules
    depends_on:
      - api

  candidate:
    image: node:20-alpine
    working_dir: /repo
    command: sh -c "npm install && npm run dev:candidate -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_AUTH_MODE: demo
    ports:
      - "5174:5174"
    volumes:
      - ./:/repo
      - /repo/node_modules
    depends_on:
      - api

volumes:
  api-data:
